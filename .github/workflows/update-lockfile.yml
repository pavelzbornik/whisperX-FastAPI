name: Update Lock File
on:
  pull_request:
    paths:
      - pyproject.toml
concurrency:
  group: update-lockfile-${{ github.head_ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  update-lockfile:
    name: Update uv.lock
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login != 'renovate[bot]'
    permissions:
      contents: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Set up uv
        uses: astral-sh/setup-uv@d7fe1a5a186096cccdd5fa2252d223b54fa53a72
      - name: Regenerate uv.lock
        run: uv lock
      - name: Commit updated uv.lock
        uses: stefanzweifel/git-auto-commit-action@f53a62c26ed5971dd2ed8768e4142f08c767ea37
        with:
          commit_message: "ci: update uv.lock"
          file_pattern: uv.lock
          commit_user_name: "GitHub Action"
          commit_user_email: "action@github.com"
