services:
  app:
    build:
      context: ..
      dockerfile: dockerfile
      target: dev
    env_file:
      - path: ../.env
        required: false
      - path: .env
        required: false
    volumes:
      - ..:/workspaces/whisperX-FastAPI:cached
    entrypoint: ["sleep", "infinity"]
    command: []
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
